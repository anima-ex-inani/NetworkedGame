name: Publish Release

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    name: Build and Publish for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        include:
          - os: ubuntu-latest
            artifact_name: NetworkedGame-linux-x64.tar.gz
          - os: windows-latest
            artifact_name: NetworkedGame-windows-x64.zip

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          java-version: 25
          distribution: temurin
          cache: gradle

      - name: Grant execute permission for gradlew
        if: runner.os != 'Windows'
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew :game:installDist

      - name: Prepare JPackage
        shell: bash
        run: |
          # Find the main jar in the installDist lib directory
          # It usually follows the pattern <project>-<version>.jar
          # Since version might be 'unspecified', we look for game*.jar
          MAIN_JAR=$(ls game/build/install/game/lib | grep "^game.*\.jar$" | head -n 1)
          echo "Found main jar: $MAIN_JAR"
          echo "MAIN_JAR=$MAIN_JAR" >> $GITHUB_ENV

      - name: Create App Image with jpackage
        shell: bash
        run: |-
          jpackage --type app-image \
            --dest dist \
            --name NetworkedGame \
            --input game/build/install/game/lib \
            --main-jar ${{ env.MAIN_JAR }} \
            --main-class io.github.animaexinani.game.NetworkedGame \
            --java-options "--enable-native-access=ALL-UNNAMED"

      - name: Package Distribution (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path dist/NetworkedGame -DestinationPath NetworkedGame-windows-x64.zip

      - name: Package Distribution (Linux)
        if: runner.os == 'Linux'
        run: |
          tar -czf NetworkedGame-linux-x64.tar.gz -C dist NetworkedGame

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
