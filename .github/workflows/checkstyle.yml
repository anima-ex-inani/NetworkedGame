name: Checkstyle

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  checkstyle:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: 25
          distribution: temurin
          cache: gradle
      - name: Make gradlew executable
        run: chmod +x gradlew
      - name: Run Checkstyle
        run: ./gradlew checkstyleMain checkstyleTest
      - name: Report Checkstyle results
        uses: motlin/checkstyle-results@v1.2.0
        with:
          checkstyle_files: "**/checkstyle/main.xml"
